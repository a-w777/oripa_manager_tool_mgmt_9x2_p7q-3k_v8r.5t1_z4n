<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オリパ管理マネージャー Pro Cloud</title>
    <link rel="icon" href="fabicon.png" sizes="any">
    <link rel="icon" href="icon.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; align-items: center;
            justify-content: center; z-index: 1000; transition: opacity 0.5s;
        }
        .card { @apply bg-white p-6 rounded-2xl shadow-md border border-slate-200; }
        .input-field { @apply w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg outline-none focus:border-indigo-500 transition; }
        
        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            border-top: 1px solid #cbd5e1;
            border-left: 1px solid #cbd5e1;
            @apply rounded-lg overflow-hidden;
        }
        .calendar-header { 
            display: flex;
            align-items: center;
            justify-content: center;
            height: 40px;
            background-color: #f8fafc;
            font-size: 11px;
            font-weight: 900;
            color: #64748b;
            border-right: 1px solid #cbd5e1;
            border-bottom: 1px solid #cbd5e1;
        }
        .calendar-day { 
            padding: 3px;
            height: 70px;
            background-color: #ffffff;
            border-right: 1px solid #cbd5e1;
            border-bottom: 1px solid #cbd5e1;
            @apply text-[11px] transition flex flex-col gap-0.5 overflow-y-auto;
        }
        .calendar-day:hover { background-color: #f1f5f9; }
        .calendar-tag { 
            font-size: 9px;
            line-height: 1.2;
            @apply block w-full px-1.5 py-0.5 rounded font-bold bg-indigo-50 text-indigo-600 border border-indigo-100 truncate mb-0.5; 
        }
        .calendar-today { background-color: #f5f3ff; }
        .calendar-today .day-num { @apply bg-indigo-600 text-white rounded-full w-5 h-5 flex items-center justify-center; }
        .day-num { @apply text-[10px] mb-1 px-1 font-bold text-slate-400; }

        .modal-enter { opacity: 0; transform: scale(0.95); }
        .modal-enter-active { opacity: 1; transform: scale(1); transition: all 0.2s ease-out; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <div id="auth_overlay" class="loading-overlay flex-col gap-6">
        <div id="loader_icon" class="animate-spin h-12 w-12 border-4 border-indigo-600 border-t-transparent rounded-full"></div>
        <div id="login_ui" class="hidden flex flex-col items-center gap-4">
            <h1 class="text-2xl font-black text-indigo-700">💎 オリパ管理 Pro</h1>
            <button id="googleLoginBtn" class="flex items-center gap-3 bg-white border border-slate-300 px-6 py-3 rounded-full font-bold shadow-sm hover:shadow-md transition active:scale-95">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Googleでログイン
            </button>
        </div>
        <p id="status_text" class="text-sm font-bold text-slate-600">接続中...</p>
    </div>

    <div id="breakdown_modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden transform transition-all">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-indigo-50">
                <h3 id="modal_title" class="text-lg font-black text-indigo-900">課金内訳</h3>
                <button id="close_modal" class="text-slate-400 hover:text-slate-600 text-2xl">&times;</button>
            </div>
            <div id="modal_content" class="p-6 max-h-[60vh] overflow-y-auto space-y-3"></div>
            <div class="p-4 bg-slate-50 border-t text-center">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Tap outside to close</p>
            </div>
        </div>
    </div>

    <nav class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2"><span>💎</span> オリパ管理 Pro</h1>
            <div class="flex items-center gap-3">
                <span id="auto_logout_timer" class="text-[10px] bg-indigo-600 px-2 py-1 rounded opacity-70">自動切断まで 30:00</span>
                <button id="logoutBtn" class="text-[10px] bg-indigo-800 hover:bg-indigo-900 px-2 py-1 rounded border border-indigo-600">ログアウト</button>
                <img id="user_photo" class="h-8 w-8 rounded-full border-2 border-white hidden">
            </div>
        </div>
    </nav>

    <main id="app_content" class="max-w-6xl mx-auto p-4 md:p-6 space-y-6 opacity-0 transition-opacity duration-500">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
            <div id="trigger_breakdown" class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-emerald-500 cursor-pointer hover:bg-emerald-50 transition active:scale-95 group">
                <p class="text-xs text-slate-500 font-bold mb-1 flex items-center justify-center gap-1">
                    <span id="label_month">支払額</span>
                    <svg class="w-3 h-3 text-emerald-400 group-hover:translate-y-0.5 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                </p>
                <h3 class="text-2xl font-black text-slate-700" id="stat_monthly_cash">¥0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-amber-500">
                <p class="text-xs text-slate-500 font-bold mb-1">選択月の高額当選</p>
                <h3 class="text-2xl font-black text-slate-700" id="stat_monthly_prizes">0</h3>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-indigo-500">
                <p class="text-xs text-slate-500 font-bold mb-1">生涯総投資額</p>
                <h3 class="text-2xl font-black text-slate-700" id="stat_total_cash">¥0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 space-y-6">
                <div class="card">
                    <h2 class="text-lg font-bold mb-4 flex justify-between">
                        <span id="form_title">📥 今日の記録</span>
                        <button id="cancelEdit" class="hidden text-xs text-red-500">キャンセル</button>
                    </h2>
                    <form id="recordForm" class="space-y-4">
                        <input type="hidden" id="editing_id">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">サービス名</label>
                            <input type="text" id="serviceName" list="service_suggestions" class="input-field" placeholder="DOPAなど" required>
                            <datalist id="service_suggestions"></datalist>
                        </div>
                        <div class="grid grid-cols-2 gap-3 bg-indigo-50 p-3 rounded-lg">
                            <div>
                                <label class="block text-[10px] font-bold text-indigo-400 mb-1">支払額(円)</label>
                                <input type="number" id="cashAmount" placeholder="0" class="p-2 border rounded-lg w-full outline-none">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-indigo-400 mb-1">チャージpts</label>
                                <input type="number" id="addedPoints" placeholder="0" class="p-2 border rounded-lg w-full outline-none">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3 bg-orange-50 p-3 rounded-lg">
                            <div>
                                <label class="block text-[10px] font-bold text-orange-400 mb-1">消費pts</label>
                                <input type="number" id="spentPoints" placeholder="0" class="p-2 border rounded-lg w-full outline-none">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-orange-400 mb-1">当選pts</label>
                                <input type="number" id="winPoints" placeholder="0" class="p-2 border rounded-lg w-full outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">高額当選アイテム（任意）</label>
                            <input type="text" id="highPrize" placeholder="アイテム名" class="input-field">
                        </div>
                        <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl shadow-lg transition active:scale-95">データを保存</button>
                    </form>
                </div>

                <div class="card">
                    <h2 class="text-xs font-bold text-slate-400 uppercase mb-4 tracking-widest">💳 現在の最新残高</h2>
                    <div id="service_balances" class="space-y-2 max-h-[300px] overflow-y-auto text-sm"></div>
                </div>
            </div>

            <div class="lg:col-span-2 card !p-0 overflow-hidden self-start">
                <div class="p-4 border-b bg-slate-50 flex flex-wrap gap-3 justify-between items-center">
                    <div class="flex gap-2 items-center flex-wrap">
                        <select id="monthFilter" class="p-1.5 border rounded-lg text-sm bg-white outline-none font-bold shadow-sm"></select>
                        <select id="serviceFilter" class="p-1.5 border rounded-lg text-sm bg-white outline-none font-bold shadow-sm">
                            <option value="all">全サービス</option>
                        </select>
                        <select id="limitFilter" class="p-1.5 border rounded-lg text-sm bg-white outline-none font-bold shadow-sm">
                            <option value="20">20件表示</option>
                            <option value="150">150件表示</option>
                            <option value="all">全件表示</option>
                        </select>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[10px] text-slate-400 font-black border-b uppercase tracking-wider">
                            <tr>
                                <th class="p-4">日付 / サービス</th>
                                <th class="p-4 text-center">支払額</th>
                                <th class="p-4 text-center">消費pt</th>
                                <th class="p-4 text-center">残高ポイント</th>
                                <th class="p-4 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody" class="divide-y text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-8 pb-12">
            <div class="card">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold flex items-center gap-2">📅 利用カレンダー</h2>
                    <div id="calendar_label" class="text-sm font-bold text-indigo-600 bg-indigo-50 px-4 py-1.5 rounded-full"></div>
                </div>
                <div id="calendar_container" class="calendar-grid"></div>
            </div>

            <div class="card">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">📊 サービス別分析</h2>
                <div id="chart_wrapper" class="w-full relative min-h-[400px]">
                    <canvas id="analysisChart"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDyblCmPzgaK0hhmGMnvvmm1O7LksLaySk",
            authDomain: "my-managertool-project.firebaseapp.com",
            projectId: "my-managertool-project",
            storageBucket: "my-managertool-project.firebasestorage.app",
            messagingSenderId: "44256475690",
            appId: "1:44256475690:web:5ac7faa743b06c0a3ee153"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const appId = 'oripa-pro-cloud-google-v1';

        let user = null;
        let records = [];
        let unsubscribeSync = null;
        let analysisChart = null;
        let logoutTimer = null;
        let timeLeft = 1800;

        const modal = document.getElementById('breakdown_modal');
        const modalContent = document.getElementById('modal_content');
        const modalTitle = document.getElementById('modal_title');
        const triggerBreakdown = document.getElementById('trigger_breakdown');

        function startLogoutTimer() {
            if (logoutTimer) clearInterval(logoutTimer);
            timeLeft = 1800;
            updateTimerDisplay();
            logoutTimer = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(logoutTimer);
                    signOut(auth);
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            const timerEl = document.getElementById('auto_logout_timer');
            if(timerEl) timerEl.innerText = `自動切断まで ${m}:${s.toString().padStart(2, '0')}`;
        }

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                document.getElementById('user_photo').src = u.photoURL;
                document.getElementById('user_photo').classList.remove('hidden');
                startLogoutTimer();
                startSync();
            } else {
                if (unsubscribeSync) unsubscribeSync();
                if (logoutTimer) clearInterval(logoutTimer);
                user = null;
                records = [];
                document.getElementById('auth_overlay').style.display = 'flex';
                document.getElementById('auth_overlay').classList.remove('opacity-0');
                document.getElementById('loader_icon').classList.add('hidden');
                document.getElementById('login_ui').classList.remove('hidden');
                document.getElementById('app_content').classList.add('opacity-0');
            }
        });

        document.getElementById('googleLoginBtn').addEventListener('click', () => signInWithPopup(auth, provider));
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

        function startSync() {
            const colRef = collection(db, 'artifacts', appId, 'users', user.uid, 'records');
            unsubscribeSync = onSnapshot(colRef, (snapshot) => {
                const raw = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                    .sort((a, b) => parseInt(a.id) - parseInt(b.id));
                
                const balances = {};
                records = raw.map(r => {
                    balances[r.service] = (balances[r.service] || 0) + (Number(r.added || 0) + Number(r.won || 0) - Number(r.spent || 0));
                    return { ...r, runningBalance: balances[r.service] };
                }).reverse();

                setupFilters();
                renderUI();
                document.getElementById('auth_overlay').classList.add('opacity-0');
                setTimeout(() => { if(user) document.getElementById('auth_overlay').style.display = 'none'; }, 500);
                document.getElementById('app_content').classList.remove('opacity-0');
            });
        }

        function setupFilters() {
            const monthsSet = new Set();
            const servicesSet = new Set();
            records.forEach(r => {
                const p = r.date.split('/');
                if(p.length >= 2) monthsSet.add(`${p[0]}/${p[1]}`);
                servicesSet.add(r.service);
            });
            
            const mf = document.getElementById('monthFilter');
            const sf = document.getElementById('serviceFilter');
            const dl = document.getElementById('service_suggestions');
            
            const currentMVal = mf.value;
            const currentSVal = sf.value;

            const months = Array.from(monthsSet).sort((a, b) => {
                const [y1, m1] = a.split('/').map(Number);
                const [y2, m2] = b.split('/').map(Number);
                return y2 !== y1 ? y2 - y1 : m2 - m1;
            });

            if (months.length === 0) {
                const now = new Date();
                months.push(`${now.getFullYear()}/${now.getMonth() + 1}`);
            }

            mf.innerHTML = months.map(m => {
                const [y, mm] = m.split('/');
                return `<option value="${m}">${y}年 ${mm}月</option>`;
            }).join('');

            sf.innerHTML = '<option value="all">全サービス表示</option>' + Array.from(servicesSet).sort().map(s => `<option value="${s}">${s}</option>`).join('');
            dl.innerHTML = Array.from(servicesSet).sort().map(s => `<option value="${s}"></option>`).join('');

            mf.value = currentMVal && months.includes(currentMVal) ? currentMVal : months[0];
            sf.value = currentSVal || "all";
        }

        function showBreakdown() {
            const mFilterVal = document.getElementById('monthFilter').value;
            const [y, m] = mFilterVal.split('/');
            const breakdown = {};
            records.forEach(r => {
                const p = r.date.split('/');
                if(`${p[0]}/${p[1]}` === mFilterVal) {
                    breakdown[r.service] = (breakdown[r.service] || 0) + Number(r.cash || 0);
                }
            });

            const sorted = Object.entries(breakdown).sort((a, b) => b[1] - a[1]);
            modalTitle.innerText = `${y}年 ${m}月の課金内訳`;
            
            if (sorted.length === 0) {
                modalContent.innerHTML = `<p class="text-center text-slate-400 py-8">データがありません</p>`;
            } else {
                modalContent.innerHTML = sorted.map(([name, amount]) => `
                    <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100 hover:border-indigo-200 transition">
                        <span class="font-black text-slate-700">${name}</span>
                        <span class="text-emerald-600 font-black text-lg">¥${amount.toLocaleString()}</span>
                    </div>
                `).join('');
            }
            modal.style.display = 'flex';
        }

        function closeModal() { modal.style.display = 'none'; }
        triggerBreakdown.addEventListener('click', showBreakdown);
        document.getElementById('close_modal').addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => { if(e.target === modal) closeModal(); });

        function renderUI() {
            const m = document.getElementById('monthFilter').value;
            const s = document.getElementById('serviceFilter').value;
            const limit = document.getElementById('limitFilter').value; // 表示件数フィルターの取得
            const currentBalances = {};
            const serviceSummary = {};
            let tCash = 0, mCash = 0, mPrizes = 0;

            records.forEach(r => {
                if (currentBalances[r.service] === undefined) currentBalances[r.service] = r.runningBalance;
                
                if (!serviceSummary[r.service]) serviceSummary[r.service] = { invest: 0, totalEarnedPts: 0, currentBalance: 0 };
                serviceSummary[r.service].invest += Number(r.cash || 0);
                serviceSummary[r.service].totalEarnedPts += (Number(r.added || 0) + Number(r.won || 0));
                
                tCash += Number(r.cash || 0);

                const p = r.date.split('/');
                if(`${p[0]}/${p[1]}` === m) {
                    mCash += Number(r.cash || 0);
                    if(r.prize) mPrizes++;
                }
            });

            // 最終的な残高をサマリーにセット
            Object.keys(serviceSummary).forEach(name => {
                serviceSummary[name].currentBalance = currentBalances[name] || 0;
            });

            document.getElementById('stat_monthly_cash').innerText = `¥${mCash.toLocaleString()}`;
            document.getElementById('stat_monthly_prizes').innerText = mPrizes;
            document.getElementById('stat_total_cash').innerText = `¥${tCash.toLocaleString()}`;
            
            const [yLabel, mLabel] = m.split('/');
            document.getElementById('label_month').innerText = `${mLabel}月の支払額`;

            let filtered = records.filter(r => {
                const p = r.date.split('/');
                return `${p[0]}/${p[1]}` === m && (s === 'all' || r.service === s);
            });

            // 表示件数の制限を適用
            if (limit !== 'all') {
                filtered = filtered.slice(0, parseInt(limit));
            }

            document.getElementById('historyBody').innerHTML = filtered.map(r => {
                const add = (Number(r.added || 0) + Number(r.won || 0));
                const addText = add > 0 ? `<div class="text-[10px] text-slate-400 font-bold mb-0.5">+${add.toLocaleString()}</div>` : '';
                return `
                <tr class="hover:bg-slate-50 border-b border-slate-100">
                    <td class="p-4"><div class="text-[10px] text-slate-400 font-mono">${r.date}</div><div class="font-bold text-slate-700">${r.service}</div></td>
                    <td class="p-4 text-center text-rose-500 font-bold">¥${Number(r.cash || 0).toLocaleString()}</td>
                    <td class="p-4 text-center text-orange-500">-${Number(r.spent || 0).toLocaleString()}</td>
                    <td class="p-4 text-center">
                        <div class="flex flex-col items-center">
                            ${addText}
                            <div class="text-indigo-600 font-black">${Number(r.runningBalance || 0).toLocaleString()}</div>
                        </div>
                    </td>
                    <td class="p-4 text-right"><button onclick="window.editRecord('${r.id}')" class="text-indigo-600 text-xs font-bold">修正</button></td>
                </tr>
            `}).join('');

            document.getElementById('service_balances').innerHTML = Object.entries(currentBalances).map(([name, bal]) => `
                <div class="flex justify-between bg-slate-50 p-3 rounded-xl border border-slate-100 mb-2">
                    <span class="font-bold text-slate-600">${name}</span>
                    <span class="text-indigo-600 font-black">${Number(bal || 0).toLocaleString()} pt</span>
                </div>
            `).join('');

            renderCalendar(m);
            renderChart(serviceSummary);
        }

        function renderCalendar(mStr) {
            const [y, m] = mStr.split('/').map(Number);
            document.getElementById('calendar_label').innerText = `${y}年 ${m}月`;
            const first = new Date(y, m - 1, 1).getDay();
            const last = new Date(y, m, 0).getDate();
            let html = ['日','月','火','水','木','金','土'].map(d => `<div class="calendar-header">${d}</div>`).join('');
            for(let i=0; i<first; i++) html += `<div class="calendar-day bg-slate-50/50"></div>`;
            for(let d=1; d<=last; d++) {
                const dayRecs = records.filter(r => {
                    const p = r.date.split('/');
                    return Number(p[0]) === y && Number(p[1]) === m && Number(p[2]) === d;
                });
                const isToday = new Date().toLocaleDateString('ja-JP') === new Date(y, m-1, d).toLocaleDateString('ja-JP');
                
                // 【修正】支払額（cash）は無視し、消費pt（spent）があるサービスのみを抽出
                const spentServices = [...new Set(dayRecs.filter(r => Number(r.spent || 0) > 0).map(r => r.service))];
                
                html += `
                    <div class="calendar-day ${isToday ? 'calendar-today' : ''}">
                        <div class="day-num">${d}</div>
                        <div class="flex flex-col">${spentServices.map(s => `<span class="calendar-tag">${s}</span>`).join('')}</div>
                    </div>
                `;
            }
            document.getElementById('calendar_container').innerHTML = html;
        }

        function renderChart(summary) {
            const ctx = document.getElementById('analysisChart').getContext('2d');
            const labels = Object.keys(summary);
            const chartHeight = Math.max(400, labels.length * 80); // 高さを少し広げる
            document.getElementById('chart_wrapper').style.height = `${chartHeight}px`;

            if (analysisChart) analysisChart.destroy();
            analysisChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { 
                            label: '累計投資額 (円)', 
                            data: labels.map(l => summary[l].invest), 
                            backgroundColor: '#fb7185',
                            borderRadius: 6
                        },
                        { 
                            label: '累計獲得ポイント', 
                            data: labels.map(l => summary[l].totalEarnedPts), 
                            backgroundColor: '#818cf8',
                            borderRadius: 6
                        },
                        { 
                            label: '現在のポイント残高', 
                            data: labels.map(l => summary[l].currentBalance), 
                            backgroundColor: '#fbbf24',
                            borderRadius: 6
                        }
                    ]
                },
                options: { 
                    indexAxis: 'y', 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top', labels: { font: { weight: 'bold' } } },
                        tooltip: { 
                            padding: 12,
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.x !== null) {
                                        label += context.parsed.x.toLocaleString() + (context.datasetIndex === 0 ? ' 円' : ' pt');
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            grid: { display: false },
                            ticks: { font: { size: 10 } }
                        },
                        y: {
                            grid: { color: '#f1f5f9' },
                            ticks: { font: { weight: 'bold', size: 12 } }
                        }
                    }
                }
            });
        }

        window.editRecord = (id) => {
            const r = records.find(rec => rec.id == id);
            document.getElementById('editing_id').value = r.id;
            document.getElementById('serviceName').value = r.service;
            document.getElementById('cashAmount').value = r.cash;
            document.getElementById('addedPoints').value = r.added;
            document.getElementById('spentPoints').value = r.spent;
            document.getElementById('winPoints').value = r.won;
            document.getElementById('highPrize').value = r.prize;
            document.getElementById('submitBtn').innerText = "修正を保存";
            document.getElementById('cancelEdit').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        document.getElementById('recordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('editing_id').value;
            const docId = editId || `${Date.now()}`;
            const data = {
                date: editId ? records.find(r => r.id === editId).date : new Date().toLocaleDateString('ja-JP'),
                service: document.getElementById('serviceName').value.trim(),
                cash: parseInt(document.getElementById('cashAmount').value) || 0,
                added: parseInt(document.getElementById('addedPoints').value) || 0,
                spent: parseInt(document.getElementById('spentPoints').value) || 0,
                won: parseInt(document.getElementById('winPoints').value) || 0,
                prize: document.getElementById('highPrize').value.trim()
            };
            await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'records', docId), data);
            document.getElementById('recordForm').reset();
            document.getElementById('editing_id').value = "";
            document.getElementById('submitBtn').innerText = "データを保存";
            document.getElementById('cancelEdit').classList.add('hidden');
            startLogoutTimer();
        });

        document.getElementById('cancelEdit').addEventListener('click', () => {
            document.getElementById('recordForm').reset();
            document.getElementById('editing_id').value = "";
            document.getElementById('submitBtn').innerText = "データを保存";
            document.getElementById('cancelEdit').classList.add('hidden');
        });

        document.getElementById('monthFilter').addEventListener('change', renderUI);
        document.getElementById('serviceFilter').addEventListener('change', renderUI);
        document.getElementById('limitFilter').addEventListener('change', renderUI); // 新しく追加した表示件数フィルターのイベント
        
        ['mousedown', 'keydown', 'touchstart'].forEach(type => {
            document.addEventListener(type, () => { if (user) startLogoutTimer(); });
        });
    </script>
</body>
</html>
